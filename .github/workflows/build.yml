name: Build Batman Doom Vita VPK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Install dependencies
        run: |
          apk update
          apk add --no-cache git cmake make python3 py3-pip py3-pillow bash
          pip3 install --break-system-packages Pillow || pip3 install Pillow || true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone doomgeneric
        run: |
          git clone --depth 1 https://github.com/ozkl/doomgeneric.git

      - name: Clone Chocolate Doom for DEHACKED sources
        run: |
          git clone --depth 1 https://github.com/chocolate-doom/chocolate-doom.git

      - name: Clone Nuked OPL3
        run: |
          git clone --depth 1 https://github.com/nukeykt/Nuked-OPL3.git

      - name: Copy Vita backend and OPL3 into engine
        run: |
          cp doomgeneric_vita.c doomgeneric/doomgeneric/doomgeneric_vita.c
          cp Nuked-OPL3/opl3.h doomgeneric/doomgeneric/opl3.h
          cp Nuked-OPL3/opl3.c doomgeneric/doomgeneric/opl3.c

      - name: Add DEHACKED support from Chocolate Doom
        run: |
          cd doomgeneric/doomgeneric
          # Copy core DEH parsing/processing files from Chocolate Doom
          for f in deh_deh.c deh_io.c deh_main.c deh_mapping.c deh_text.c; do
            if [ -f "../../chocolate-doom/src/$f" ]; then
              cp "../../chocolate-doom/src/$f" .
              echo "Copied src/$f"
            fi
          done
          # Copy Doom-specific DEH handler files
          for f in deh_ammo.c deh_bexstr.c deh_cheat.c deh_doom.c deh_frame.c deh_misc.c deh_ptr.c deh_sound.c deh_thing.c deh_weapon.c; do
            if [ -f "../../chocolate-doom/src/doom/$f" ]; then
              cp "../../chocolate-doom/src/doom/$f" .
              echo "Copied doom/$f"
            fi
          done
          # Copy ALL DEH headers from both locations
          for f in ../../chocolate-doom/src/deh_*.h; do
            [ -f "$f" ] && cp "$f" . && echo "Copied header $(basename $f)"
          done
          for f in ../../chocolate-doom/src/doom/deh_*.h; do
            base=$(basename "$f")
            if [ -f "$f" ] && [ ! -f "./$base" ]; then
              cp "$f" . && echo "Copied doom header $base"
            fi
          done
          echo "=== DEHACKED files ==="
          ls -1 deh_*.c 2>/dev/null | wc -l
          ls -1 deh_*.c 2>/dev/null

      - name: Patch doomgeneric for PWAD and DEHACKED compatibility
        run: |
          cd doomgeneric/doomgeneric
          # Disable RANGECHECK
          sed -i 's/^#define RANGECHECK/\/\/ #define RANGECHECK/' doomdef.h
          # Enable FEATURE_DEHACKED
          if ! grep -q "^#define FEATURE_DEHACKED" doomfeatures.h 2>/dev/null; then
            echo '#define FEATURE_DEHACKED 1' >> doomfeatures.h
          fi
          # Patch d_main.c to auto-load DEHACKED lumps from PWADs
          python3 ${GITHUB_WORKSPACE}/scripts/patch_dehacked.py
          # Fix R_DrawVisSprite: modular wrapping for PWAD sprites
          sed -i '/texturecolumn = frac>>FRACBITS;/a\\tif (SHORT(patch->width) > 0) { texturecolumn = texturecolumn % SHORT(patch->width); if (texturecolumn < 0) texturecolumn += SHORT(patch->width); }' r_things.c
          # Safety: clamp dc_yl and dc_yh in R_DrawColumn
          sed -i 's/count = dc_yh - dc_yl;/if (dc_yl < 0) dc_yl = 0; if (dc_yh >= SCREENHEIGHT) dc_yh = SCREENHEIGHT - 1; count = dc_yh - dc_yl;/' r_draw.c || true
          echo "=== All patches applied ==="

      - name: Generate assets
        run: |
          python3 scripts/gen_assets.py || echo "Asset generation skipped"

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake
          make -j$(nproc)

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: BatmanDoomVita-vpk
          path: build/*.vpk
          if-no-files-found: error
