
name: Build Batman Doom Vita VPK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Install dependencies
        run: |
          apk update
          apk add --no-cache git cmake make python3 py3-pip py3-pillow bash
          pip3 install --break-system-packages Pillow || pip3 install Pillow || true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone doomgeneric
        run: |
          git clone --depth 1 https://github.com/ozkl/doomgeneric.git

      - name: Clone Nuked OPL3
        run: |
          git clone --depth 1 https://github.com/nukeykt/Nuked-OPL3.git

      - name: Copy Vita backend and OPL3 into engine
        run: |
          cp doomgeneric_vita.c doomgeneric/doomgeneric/doomgeneric_vita.c
          cp Nuked-OPL3/opl3.h doomgeneric/doomgeneric/opl3.h
          cp Nuked-OPL3/opl3.c doomgeneric/doomgeneric/opl3.c

      - name: Patch doomgeneric for PWAD compatibility
        run: |
          cd doomgeneric/doomgeneric
          # Disable RANGECHECK (fatal debug asserts) - standard for release builds
          sed -i 's/^#define RANGECHECK/\/\/ #define RANGECHECK  \/\/ disabled for PWAD compat/' doomdef.h

          # Fix R_DrawVisSprite: use modular wrapping instead of hard clamp
          # Hard clamping causes PWAD sprites (like Batman enemies) to render
          # from column 0 repeatedly, making them invisible or flickering.
          sed -i '/texturecolumn = frac>>FRACBITS;/a\\tif (SHORT(patch->width) > 0) { texturecolumn = texturecolumn % SHORT(patch->width); if (texturecolumn < 0) texturecolumn += SHORT(patch->width); }' r_things.c

          # Protect R_DrawColumn from out-of-bounds dc_x
          sed -i '/void R_DrawColumn/,/^{/{/^{/a\\    if (dc_x < 0 || dc_x >= SCREENWIDTH) return;\n}' r_draw.c || true

          # Safety: clamp dc_yl and dc_yh in R_DrawColumn
          sed -i 's/count = dc_yh - dc_yl;/if (dc_yl < 0) dc_yl = 0; if (dc_yh >= SCREENHEIGHT) dc_yh = SCREENHEIGHT - 1; count = dc_yh - dc_yl;/' r_draw.c || true

          echo "RANGECHECK disabled, sprite wrapping fix applied"
          grep -n "RANGECHECK" doomdef.h | head -3
          grep -n "texturecolumn" r_things.c | head -10

      - name: Generate assets
        run: |
          python3 scripts/gen_assets.py || echo "Asset generation skipped (no source PNGs)"

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake
          make -j$(nproc)

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: BatmanDoomVita-vpk
          path: build/*.vpk
          if-no-files-found: error
