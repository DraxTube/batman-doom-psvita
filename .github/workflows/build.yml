name: Build Batman Doom Vita VPK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Install dependencies
        run: |
          apk update
          apk add --no-cache git cmake make python3 py3-pip py3-pillow bash
          pip3 install --break-system-packages Pillow || pip3 install Pillow || true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone doomgeneric
        run: |
          git clone --depth 1 https://github.com/ozkl/doomgeneric.git

      - name: Clone Nuked OPL3
        run: |
          git clone --depth 1 https://github.com/nukeykt/Nuked-OPL3.git

      - name: Copy Vita backend and OPL3 into engine
        run: |
          cp doomgeneric_vita.c doomgeneric/doomgeneric/doomgeneric_vita.c
          cp Nuked-OPL3/opl3.h doomgeneric/doomgeneric/opl3.h
          cp Nuked-OPL3/opl3.c doomgeneric/doomgeneric/opl3.c

      - name: Patch doomgeneric for PWAD compatibility
        run: |
          cd doomgeneric/doomgeneric
          # Fix R_DrawSpriteRange crash: clamp texturecolumn instead of I_Error
          sed -i 's/I_Error ("R_DrawSpriteRange: bad texturecolumn");/{ if (texturecolumn < 0) texturecolumn = 0; if (texturecolumn >= SHORT(patch->width)) texturecolumn = SHORT(patch->width) - 1; }/' r_things.c
          # Fix R_ProjectSprite: skip invalid sprites instead of crashing
          sed -i 's/I_Error ("R_ProjectSprite: invalid sprite number %i "/fprintf(stderr, "R_ProjectSprite: invalid sprite number %i "/' r_things.c
          sed -i 's/I_Error ("R_ProjectSprite: invalid sprite frame %i : %i "/fprintf(stderr, "R_ProjectSprite: invalid sprite frame %i : %i "/' r_things.c
          # Fix any R_DrawColumn range errors
          sed -i '/R_DrawColumn: bad column range/d' r_draw.c || true
          sed -i 's/I_Error ("R_DrawColumn: .*");/return;/' r_draw.c || true
          echo "Patches applied"

      - name: Generate assets
        run: |
          python3 scripts/gen_assets.py || echo "Asset generation skipped (no source PNGs)"

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake
          make -j$(nproc)

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: BatmanDoomVita-vpk
          path: build/*.vpk
          if-no-files-found: error
